    .pulse::after { content: ""; position: absolute; top: 0; left: -55%; width: 30%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,.18), transparent); transform: skewX(-20deg); animation: shineMove 3.1s infinite; pointer-events: none; }
    @keyframes pulseGold { 0%,100% { opacity: .50; } 50% { opacity: 1; } }
    @keyframes pulseBlue { 0%,100% { opacity: .50; } 50% { opacity: 1; } }
    @keyframes pulseVip { 0%,100% { opacity: .58; } 50% { opacity: 1; } }
    @keyframes shineMove { 0% { left: -60%; opacity: 0; } 18% { opacity: .65; } 52% { left: 125%; opacity: 0; } 100% { left: 125%; opacity: 0; } }

    .count-box { display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 11px; background: linear-gradient(180deg,#0b0b0b 0%,#000 100%); border: 1px solid rgba(255,180,40,.82); box-shadow: inset 0 0 15px rgba(255,174,25,.14), 0 0 14px rgba(255,120,0,.22); }

  <script>
    const targetDate = new Date("2026-06-20T22:00:00-03:00").getTime();
    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;
      if (distance <= 0) {
        document.getElementById("days").textContent = "00";
        document.getElementById("hours").textContent = "00";
        document.getElementById("minutes").textContent = "00";
        document.getElementById("seconds").textContent = "00";
        return;
      }
      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((distance / (1000 * 60)) % 60);
      const seconds = Math.floor((distance / 1000) % 60);
      document.getElementById("days").textContent = String(days).padStart(2, "0");
      document.getElementById("hours").textContent = String(hours).padStart(2, "0");
      document.getElementById("minutes").textContent = String(minutes).padStart(2, "0");
      document.getElementById("seconds").textContent = String(seconds).padStart(2, "0");
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
